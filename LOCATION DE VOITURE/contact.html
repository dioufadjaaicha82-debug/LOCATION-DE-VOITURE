<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saloum Drive - Contact</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}
body{
    background:#111;
    color:white;
    background:
    linear-gradient(rgba(0,0,0,0.6),
    rgba(0,0,0,0.6)),
    url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ20curbjkHCQ1YMqFfO_APy2I3k-etW4l3TqiXod9iTQ&s=10");

}
/* MENU */
nav{
    background:#000;
    padding:20px 50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
.logo{
    color:white;
    font-size:32px;
    font-weight:bold;
}
.logo span{
    color:#f5b400;
}
nav a{
    color:white;
    text-decoration:none;
    margin-left:25px;
    font-size:18px;
}
nav a:hover{
    color:#f5b400;
}
/* CONTACT */
.contact{
    width:80%;
    margin:50px auto;
    display:flex;
    justify-content:space-between;
    gap:40px;
}
.info{
    width:40%;
}
.info h1{
    color:#f5b400;
    margin-bottom:20px;
}
.info p{
    margin:15px 0;
    font-size:18px;
}
.formulaire{
    width:50%;
    background:#222;
    padding:30px;
    border-radius:15px;
}
.formulaire h2{
    text-align:center;
    color:#f5b400;
    margin-bottom:20px;
}
input, textarea{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border:none;
    border-radius:10px;
    outline:none;
}
textarea{
    height:120px;
}
button{
    width:100%;
    padding:15px;
    background:#f5b400;
    border:none;
    border-radius:25px;
    font-size:18px;
    cursor:pointer;
}
button:hover{
    background:white;
}
/* RESPONSIVE */
@media(max-width:900px){
.contact{
    flex-direction:column;
}
.info,.formulaire{
    width:100%;
}
nav{
    flex-direction:column;
}
}
</style>
</head>
<body>
<!-- Navigation -->
<nav>
<div class="logo">
Saloum <span>Drive</span>
</div>
<div>
<a href="index.html">Accueil</a>
<a href="voitures.html">Voitures</a>
<a href="services.html">Services</a>
<a href="apropos.html">A propos</a>
<a href="contact.html">Contact</a>
</div>
</nav>
<section class="contact">
<div class="info">
<h1>
Contactez-nous
</h1>
<p>
📍 Adresse : Kaolack, Sénégal
</p>
<p>
📞 Téléphone : +221 77 000 00 00
</p>
<p>
📧 Email : saloumdrive@gmail.com
</p>
<p>
Nous sommes disponibles pour répondre à toutes vos demandes de location.
</p>
</div>
<div class="formulaire">
<h2>
Envoyer un message
</h2>
<form>
<input type="text" placeholder="Votre nom">
<input type="email" placeholder="Votre email">
<input type="tel" placeholder="Votre téléphone">
<textarea placeholder="Votre message"></textarea>
<button type="submit">
Envoyer
</button>
</form>
</div>
</section>
</body>
</html>
